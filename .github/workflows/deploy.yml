on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.jar.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build application
        run: |
          if [ -f mvnw ] && [ -f .mvn/wrapper/maven-wrapper.properties ]; then
            chmod +x mvnw && ./mvnw clean package -DskipTests
          elif [ -f pom.xml ]; then
            mvn clean package -DskipTests
          elif [ -f gradlew ] && [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            chmod +x gradlew && ./gradlew bootJar -x test
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            gradle bootJar -x test
          else
            echo "ERROR: No build file found" && exit 1
          fi

      - name: Find and export JAR
        id: jar
        run: |
          JAR=$(find target build/libs -name "*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" ! -name "*plain*" \
            2>/dev/null | head -1)
          if [ -z "$JAR" ]; then echo "ERROR: No JAR built" && exit 1; fi
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Built JAR: $JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ steps.jar.outputs.jar_path }}
          retention-days: 1

  build-and-push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ secrets.PROJECT_NAME }}" \
            --region "${{ secrets.AWS_REGION }}" 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "${{ secrets.PROJECT_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: jar

      - name: Build and push Docker image
        id: image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.PROJECT_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ steps.login-ecr.outputs.registry }}/${{ secrets.PROJECT_NAME }}:latest"
          docker build -t $IMAGE -t $IMAGE_LATEST .
          docker push $IMAGE
          docker push $IMAGE_LATEST
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
        working-directory: terraform

      - name: Import ECR repository if exists
        run: |
          terraform import \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="spring_datasource_url=${{ secrets.SPRING_DATASOURCE_URL }}" \
            -var="spring_datasource_username=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            -var="spring_datasource_password=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            -var="spring_data_mongodb_uri=${{ secrets.SPRING_DATA_MONGODB_URI }}" \
            -var="spring_profiles_active=${{ secrets.SPRING_PROFILES_ACTIVE }}" \
            -var="rds_install_db=${{ secrets.RDS_INSTALL_DB }}" \
            -var="db_type=${{ secrets.DB_TYPE }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            aws_ecr_repository.app "${{ secrets.PROJECT_NAME }}" 2>/dev/null || true
        working-directory: terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="spring_datasource_url=${{ secrets.SPRING_DATASOURCE_URL }}" \
            -var="spring_datasource_username=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            -var="spring_datasource_password=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            -var="spring_data_mongodb_uri=${{ secrets.SPRING_DATA_MONGODB_URI }}" \
            -var="spring_profiles_active=${{ secrets.SPRING_PROFILES_ACTIVE }}" \
            -var="rds_install_db=${{ secrets.RDS_INSTALL_DB }}" \
            -var="db_type=${{ secrets.DB_TYPE }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
        working-directory: terraform

  deploy-ecs:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.PROJECT_NAME }}-cluster" \
            --service "${{ secrets.PROJECT_NAME }}-service" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.PROJECT_NAME }}-cluster" \
            --services "${{ secrets.PROJECT_NAME }}-service" \
            --region "${{ secrets.AWS_REGION }}"

  verify:
    needs: deploy-ecs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
        working-directory: terraform

      - name: Get ALB URL and health check
        run: |
          ALB_URL=$(terraform output -raw alb_url)
          echo "Application URL: $ALB_URL"
          echo "Running health check against $ALB_URL/actuator/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ALB_URL/actuator/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Health check passed. Application is live at: $ALB_URL"
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: Health check did not return 2xx/3xx after 12 attempts. App may still be starting."
        working-directory: terraform